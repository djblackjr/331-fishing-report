name: Daily Conditions Refresh

"on":
  schedule:
    # 08:13 UTC = ~3:13 AM Central. Kept as a fallback trigger, though the
    # real reliable schedule is now the external cron-job.org ping hitting
    # workflow_dispatch directly (GitHub's native schedule proved unreliable
    # for this repo — see project history).
    - cron: '13 8 * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch live conditions and update conditions.json
        run: node scripts/update-conditions.mjs

      - name: Refresh local bite report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-bite-report.mjs

      - name: Refresh AI summary and per-location notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-location-notes.mjs

      - name: Commit and push if changed
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-refresh fishing conditions"
          file_pattern: src/data/conditions.json

      - name: Trigger Pages deploy
        # A push made using the workflow's default built-in token does NOT
        # trigger other workflows' `on: push` rules (GitHub blocks this
        # specifically to prevent infinite trigger loops). That silently
        # broke the deploy step, since daily-refresh's commit never kicked
        # off deploy-pages.yml. Using a real Personal Access Token here
        # (stored as the DEPLOY_TOKEN secret) doesn't have that restriction.
        if: steps.commit.outputs.changes_detected == 'true'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/djblackjr/331-fishing-report/actions/workflows/deploy-pages.yml/dispatches \
            -d '{"ref":"main"}'
