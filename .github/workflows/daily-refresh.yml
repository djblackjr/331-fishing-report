name: Daily Conditions Refresh

on:
  schedule:
    # 08:00 UTC = 3:00 AM Central Daylight Time (summer).
    # During Central Standard Time (winter, roughly Nov–Mar) this runs at 2:00 AM local
    # instead of 3:00 AM, since GitHub Actions cron doesn't follow DST. If you want it
    # locked to exactly 3:00 AM year-round, change this to '0 9 * * *' every November
    # and back to '0 8 * * *' every March — or just leave it, a 1-hour drift in winter
    # is harmless for a morning fishing report.
    - cron: '0 8 * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab too

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch live conditions and update conditions.json
        run: node scripts/update-conditions.mjs

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-refresh fishing conditions"
          file_pattern: src/data/conditions.json
